<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Anderlecht - Nieuw evenement</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <div th:replace="~{fragments/layout :: navbar}"></div>

    <main class="max-w-2xl mx-auto px-4 py-10 flex-grow w-full">
        <h1 class="text-3xl font-bold text-green-800 mb-2">Nieuw evenement</h1>
        <p class="text-gray-500 mb-8">Vul alle velden in om een nieuw evenement toe te voegen.</p>

        <div class="bg-white rounded-xl shadow p-8">
            <form th:action="@{/events/new}" th:object="${event}" method="post" class="space-y-5">

                <!-- Titel -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Titel *</label>
                    <input type="text" th:field="*{titel}" placeholder="Naam van het evenement"
                           class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-500"/>
                    <p th:if="${#fields.hasErrors('titel')}" th:errors="*{titel}"
                       class="text-red-500 text-sm mt-1"></p>
                </div>

                <!-- Tijdstip -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Tijdstip *</label>
                    <input type="datetime-local" th:field="*{tijdstip}"
                           class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-500"/>
                    <p th:if="${#fields.hasErrors('tijdstip')}" th:errors="*{tijdstip}"
                       class="text-red-500 text-sm mt-1"></p>
                </div>

                <!-- Omschrijving -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Omschrijving *</label>
                    <textarea th:field="*{omschrijving}" rows="4" placeholder="Beschrijf het evenement..."
                              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>
                    <p th:if="${#fields.hasErrors('omschrijving')}" th:errors="*{omschrijving}"
                       class="text-red-500 text-sm mt-1"></p>
                </div>

                <!-- Organisatie -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Organisatie *</label>
                    <input type="text" th:field="*{organisatie}" placeholder="Eigen beheer of naam partner"
                           class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-500"/>
                    <p th:if="${#fields.hasErrors('organisatie')}" th:errors="*{organisatie}"
                       class="text-red-500 text-sm mt-1"></p>
                </div>

                <!-- Mail contactpersoon -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">E-mail contactpersoon *</label>
                    <input type="email" th:field="*{mailContactpersoon}" placeholder="contact@voorbeeld.be"
                           class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-500"/>
                    <p th:if="${#fields.hasErrors('mailContactpersoon')}" th:errors="*{mailContactpersoon}"
                       class="text-red-500 text-sm mt-1"></p>
                </div>

                <!-- Locatie -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Locatie *</label>
                    <select th:field="*{locatie.id}"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-500">
                        <option value="">-- Kies een locatie --</option>
                        <option th:each="loc : ${locaties}"
                                th:value="${loc.id}"
                                th:text="${loc.naam + ' (' + loc.adres + ', max. ' + loc.capaciteit + ' personen)'}">
                        </option>
                    </select>
                    <p th:if="${#fields.hasErrors('locatie')}" th:errors="*{locatie}"
                       class="text-red-500 text-sm mt-1"></p>
                </div>

                <!-- Knoppen -->
                <div class="flex gap-4 pt-2">
                    <button type="submit"
                            class="bg-green-700 text-white font-semibold px-6 py-2.5 rounded-lg hover:bg-green-800 transition shadow">
                        Evenement opslaan
                    </button>
                    <a th:href="@{/}"
                       class="bg-gray-200 text-gray-700 font-semibold px-6 py-2.5 rounded-lg hover:bg-gray-300 transition">
                        Annuleren
                    </a>
                </div>
            </form>
        </div>
    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
