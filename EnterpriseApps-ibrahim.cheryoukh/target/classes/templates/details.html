<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Anderlecht - Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <div th:replace="~{fragments/layout :: navbar}"></div>

    <main class="max-w-3xl mx-auto px-4 py-10 flex-grow w-full">
        <a th:href="@{/}" class="text-green-700 hover:underline text-sm mb-6 inline-block">← Terug naar overzicht</a>

        <div class="bg-white rounded-xl shadow p-8">
            <h1 class="text-3xl font-bold text-green-800 mb-1" th:text="${event.titel}"></h1>
            <p class="text-gray-400 text-sm mb-6"
               th:text="${#temporals.format(event.tijdstip, 'dd MMMM yyyy, HH:mm')}"></p>

            <div class="space-y-5">
                <div>
                    <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Omschrijving</h2>
                    <p class="text-gray-700 leading-relaxed" th:text="${event.omschrijving}"></p>
                </div>

                <hr class="border-gray-100"/>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Organisatie</h2>
                        <p class="text-gray-700 font-medium" th:text="${event.organisatie}"></p>
                    </div>
                    <div>
                        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Contactpersoon</h2>
                        <a th:href="'mailto:' + ${event.mailContactpersoon}"
                           th:text="${event.mailContactpersoon}"
                           class="text-green-700 hover:underline"></a>
                    </div>
                </div>

                <hr class="border-gray-100"/>

                <div>
                    <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Locatie</h2>
                    <div class="bg-green-50 rounded-lg p-4">
                        <p class="font-semibold text-green-800" th:text="${event.locatie.naam}"></p>
                        <p class="text-gray-600 text-sm" th:text="${event.locatie.adres}"></p>
                        <p class="text-gray-500 text-sm mt-1">
                            Maximale capaciteit:
                            <span class="font-medium" th:text="${event.locatie.capaciteit}"></span> personen
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
