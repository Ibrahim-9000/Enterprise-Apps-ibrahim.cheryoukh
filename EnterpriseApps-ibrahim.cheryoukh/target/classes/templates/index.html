<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Anderlecht - Evenementen</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <div th:replace="~{fragments/layout :: navbar}"></div>

    <main class="max-w-6xl mx-auto px-4 py-10 flex-grow w-full">
        <h1 class="text-3xl font-bold text-green-800 mb-2">Evenementen</h1>
        <p class="text-gray-500 mb-8">Overzicht van de 10 meest recente evenementen</p>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-green-800 text-white">
                    <tr>
                        <th class="px-6 py-4 font-semibold">Titel</th>
                        <th class="px-6 py-4 font-semibold">Organisatie</th>
                        <th class="px-6 py-4 font-semibold text-center">Details</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="event, stat : ${events}"
                        th:class="${stat.odd} ? 'bg-white' : 'bg-gray-50'"
                        class="border-t border-gray-100 hover:bg-green-50 transition">
                        <td class="px-6 py-4 font-medium text-gray-800" th:text="${event.titel}"></td>
                        <td class="px-6 py-4 text-gray-600" th:text="${event.organisatie}"></td>
                        <td class="px-6 py-4 text-center">
                            <a th:href="@{/events/{id}(id=${event.id})}"
                               class="inline-block bg-green-700 text-white text-sm px-4 py-1.5 rounded-full hover:bg-green-800 transition">
                                Bekijk details
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(events)}">
                        <td colspan="3" class="px-6 py-10 text-center text-gray-400 italic">
                            Nog geen evenementen beschikbaar.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-6">
            <a th:href="@{/events/new}"
               class="inline-block bg-green-700 text-white font-semibold px-6 py-3 rounded-lg hover:bg-green-800 transition shadow">
                + Nieuw evenement toevoegen
            </a>
        </div>
    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
